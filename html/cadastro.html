<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Carros</title>
    <link rel="stylesheet" href="./../css/style.css">
</head>

<body>

    <header>
        <nav>
            <a href="index.html" class="nav-btn">Início</a>
            <a href="cadastro.html" class="nav-btn">Cadastro de Carros</a>
            <a href="index.html#galeria" class="nav-btn">Todos os Carros</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            🚗 Cadastro de Carros
        </div>

        <section class="estatisticas">
            <h3>Total de carros: <span id="total_carros">0</span></h3>
        </section>

        <div id="cadastro" class="secao-cadastro">
            
            <label for="nome_carro">Nome do Carro:</label>
            <input id="nome_carro" type="text" placeholder="Digite o nome do carro">

            <label for="marca">Marca:</label>
            <input id="marca" type="text" placeholder="Digite a marca do carro">

            <label for="ano">Ano de Fabricação:</label>
            <input id="ano" type="number" placeholder="Digite o ano do carro">

            <label for="cor">Cor do Veículo:</label>
            <input id="cor" type="text" placeholder="Digite a cor do carro">

            <label for="categoria">Categoria do Carro:</label>
            <select id="categoria" title="Categoria do carro">
                <option value="">Selecione uma categoria</option>
                <option value="Esportivos">Esportivos</option>
                <option value="Antigos">Antigos</option>
                <option value="Modificados">Modificados</option>
                <option value="Caminhonetes">Caminhonetes</option>
            </select>

            <label for="descricao">Descrição:</label>
            <input id="descricao" type="text" placeholder="Digite uma breve descrição">

            <label for="input_com_imagem">Selecione uma imagem:</label>
            <input type="file" id="input_com_imagem" accept="image/*">

            <img id="preview_imagem" class="preview-imagem" alt="Pré-visualização" style="display:none; max-width: 100%; margin-top: 10px;">

            <button id="cadastrar_carros" onclick="cadastrar_carros()">Cadastrar Carro</button>
            <button id="novo_carro" onclick="novo_carro()">Limpar Campos</button>
            <button id="remover" onclick="remover_itens()">Remover Todos os Carros</button>

        </div>

    </div>

    <script src="./../java/script.js"></script>
</body>

</html>
